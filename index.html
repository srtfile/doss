<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Stream Finder</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#ddd;min-height:100vh;padding:16px}
    .wrap{max-width:860px;margin:0 auto}
    h1{font-size:1.3rem;color:#fff;margin-bottom:4px}
    .sub{font-size:.75rem;color:#444;margin-bottom:20px}
    .card{background:#141414;border:1px solid #1e1e1e;border-radius:10px;padding:20px;margin-bottom:14px}
    .row{display:flex;gap:10px;align-items:flex-end}
    .field{flex:1}
    label{display:block;font-size:.7rem;color:#555;margin-bottom:5px}
    input{width:100%;padding:9px 12px;background:#0d0d0d;border:1px solid #252525;
          border-radius:7px;color:#fff;font-size:.9rem;outline:none;transition:border-color .15s}
    input:focus{border-color:#444}
    input::placeholder{color:#333}
    .btn{padding:9px 20px;background:#e50914;color:#fff;border:none;border-radius:7px;
         font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;
         transition:background .15s,opacity .15s;height:38px}
    .btn:hover:not(:disabled){background:#c40812}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    #status{font-size:.78rem;color:#555;margin-top:10px;min-height:16px;
            display:flex;align-items:center;gap:7px}
    #status.err{color:#e55}
    #status.ok{color:#5c5}
    .spin{display:inline-block;width:12px;height:12px;border:2px solid #2a2a2a;
          border-top-color:#888;border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
    @keyframes sp{to{transform:rotate(360deg)}}
    .bar{height:2px;background:#1a1a1a;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
    .bar.on{display:block}
    .fill{height:100%;background:#e50914;border-radius:2px;transition:width .3s ease}

    /* Results */
    #results{display:none}
    .anime-hdr{font-size:1rem;color:#fff;font-weight:600;margin-bottom:14px}
    .anime-hdr span{color:#666;font-weight:400;font-size:.82rem;margin-left:8px}
    .realid-badge{display:inline-flex;align-items:center;gap:6px;background:#111;
                  border:1px solid #222;border-radius:5px;padding:3px 10px;
                  font-size:.75rem;color:#666;margin-bottom:14px}
    .realid-badge b{color:#ccc}

    /* Server tabs */
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .tab{padding:6px 14px;background:#1a1a1a;border:1px solid #222;border-radius:6px;
         font-size:.75rem;color:#777;cursor:pointer;transition:all .15s;user-select:none}
    .tab:hover{background:#1e1e1e;color:#bbb}
    .tab.active{background:#e50914;border-color:#e50914;color:#fff;font-weight:600}

    /* Player */
    .player-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;
                 border-radius:8px;overflow:hidden;margin-bottom:14px;border:1px solid #1a1a1a}
    .player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    .player-ph{position:absolute;top:0;left:0;width:100%;height:100%;
               display:flex;align-items:center;justify-content:center;
               flex-direction:column;gap:8px;color:#333;font-size:.82rem}

    /* Downloads */
    .dl-title{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:7px}
    .dl-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .dl-link{padding:5px 12px;background:#111;border:1px solid #1e1e1e;border-radius:6px;
             font-size:.72rem;color:#4af;text-decoration:none;transition:background .15s}
    .dl-link:hover{background:#161616}

    /* URL rows */
    .url-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .url-lbl{font-size:.68rem;color:#555;width:90px;flex-shrink:0}
    .url-val{flex:1;font-size:.7rem;color:#4af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cp{padding:2px 8px;font-size:.62rem;background:#1a1a1a;color:#777;
        border:1px solid #222;border-radius:4px;cursor:pointer;flex-shrink:0}
    .cp:hover{background:#1e1e1e}
    .divider{border:none;border-top:1px solid #1a1a1a;margin:12px 0}
  </style>
</head>
<body>
<div class="wrap">
  <h1>🎌 Anime Stream Finder</h1>
  <p class="sub">Kiwi SUB · DUB streams via MAL ID</p>

  <div class="card">
    <div class="row">
      <div class="field">
        <label>MAL ID</label>
        <input type="number" id="mal" placeholder="e.g. 1735" min="1"/>
      </div>
      <div class="field">
        <label>Episode</label>
        <input type="number" id="ep" placeholder="e.g. 1" min="1"/>
      </div>
      <button class="btn" id="go" onclick="getStreams()">▶ Get</button>
    </div>
    <div class="bar" id="bar"><div class="fill" id="fill" style="width:0%"></div></div>
    <div id="status"></div>
  </div>

  <div id="results">
    <div class="card">
      <div class="anime-hdr" id="anime-hdr">—</div>

      <!-- Tabs -->
      <div class="tabs" id="tabs"></div>

      <!-- Player -->
      <div class="player-wrap">
        <div class="player-ph" id="ph">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="#333"><path d="M8 5v14l11-7z"/></svg>
          Select a server
        </div>
        <iframe id="frame" allowfullscreen allow="autoplay; fullscreen" style="display:none"></iframe>
      </div>

      <!-- Downloads -->
      <div id="dl-wrap" style="display:none">
        <div class="dl-title">Downloads</div>
        <div class="dl-links" id="dl-links"></div>
      </div>

      <hr class="divider">

      <!-- URL list -->
      <div id="url-list"></div>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let servers = [];

  ['mal','ep'].forEach(id => $(id).addEventListener('keydown', e => { if(e.key==='Enter') getStreams(); }));

  function setStatus(msg, type='') { const el=$('status'); el.className=type; el.innerHTML=msg; }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  let fillTimer = null;
  function startFill(to, ms) {
    clearTimeout(fillTimer);
    const fill=$('fill'), steps=30, stepMs=ms/steps, stepPct=to/steps;
    let cur=0;
    function tick(){ cur+=stepPct; fill.style.width=Math.min(cur,95)+'%'; if(cur<to) fillTimer=setTimeout(tick,stepMs); }
    tick();
  }
  function endFill() {
    clearTimeout(fillTimer);
    $('fill').style.width='100%';
    setTimeout(()=>{ $('bar').classList.remove('on'); $('fill').style.width='0%'; }, 400);
  }

  async function getStreams() {
    const mal = $('mal').value.trim();
    const ep  = $('ep').value.trim();
    if (!mal) return setStatus('⚠ Enter MAL ID', 'err');
    if (!ep)  return setStatus('⚠ Enter episode', 'err');

    $('go').disabled = true;
    $('go').textContent = '⏳';
    $('results').style.display = 'none';
    $('bar').classList.add('on');
    startFill(90, 8000);
    setStatus('<span class="spin"></span> Fetching streams...');

    try {
      const t0  = Date.now();
      const res = await fetch(`/api/stream?mal=${mal}&ep=${ep}`);
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      endFill();
      renderResults(data, mal, ep);
      setStatus(`✓ Done in ${((Date.now()-t0)/1000).toFixed(1)}s`, 'ok');
    } catch(err) {
      endFill();
      setStatus(`✗ ${err.message}`, 'err');
    } finally {
      $('go').disabled = false;
      $('go').textContent = '▶ Get';
    }
  }

  function renderResults(data, mal, ep) {
    const kiwi = data.kiwi      || {};
    const dl   = data.downloads || {};

    $('anime-hdr').innerHTML = `MAL ${esc(mal)} <span>Episode ${esc(ep)}</span>`;

    // realid badge
    let hdrExtra = '';
    if (data.realid) {
      hdrExtra = `<div class="realid-badge" style="margin-bottom:12px">realid = <b>${esc(data.realid)}</b></div>`;
    }

    // Build server list
    servers = [];
    for (const [stype, s] of Object.entries(kiwi)) {
      if (s.error) continue;
      if (s.player_url) {
        servers.push({ label: `Kiwi ${stype.toUpperCase()}`, url: s.player_url, m3u8: s.m3u8 });
      }
    }

    // Tabs
    const tabsEl = $('tabs');
    tabsEl.innerHTML = '';
    servers.forEach((srv, i) => {
      const t = document.createElement('div');
      t.className = 'tab' + (i===0?' active':'');
      t.textContent = srv.label;
      t.onclick = () => selectServer(i);
      tabsEl.appendChild(t);
    });

    // Downloads
    const dlKeys = Object.keys(dl);
    if (dlKeys.length) {
      $('dl-wrap').style.display = 'block';
      $('dl-links').innerHTML = dlKeys.map(q =>
        `<a class="dl-link" href="${esc(dl[q])}" target="_blank" rel="noopener">${esc(q)}</a>`
      ).join('');
    } else {
      $('dl-wrap').style.display = 'none';
    }

    // URL list
    let urlHtml = hdrExtra;
    for (const [stype, s] of Object.entries(kiwi)) {
      if (s.error) {
        urlHtml += `<div class="url-row"><span class="url-lbl">Kiwi ${stype.toUpperCase()}</span><span style="font-size:.7rem;color:#e55">${esc(s.error)}</span></div>`;
        continue;
      }
      if (s.m3u8)       urlHtml += urlRow(`Kiwi ${stype.toUpperCase()} m3u8`,   s.m3u8);
      if (s.player_url) urlHtml += urlRow(`Kiwi ${stype.toUpperCase()} player`, s.player_url);
      const intro = (s.skip_data||{}).intro||[0,0];
      const outro = (s.skip_data||{}).outro||[0,0];
      if (intro[1]>0) urlHtml += `<div class="url-row"><span class="url-lbl" style="color:#444">Skip intro</span><span style="font-size:.7rem;color:#555">${intro[0]}s → ${intro[1]}s</span></div>`;
      if (outro[1]>0) urlHtml += `<div class="url-row"><span class="url-lbl" style="color:#444">Skip outro</span><span style="font-size:.7rem;color:#555">${outro[0]}s → ${outro[1]}s</span></div>`;
    }
    $('url-list').innerHTML = urlHtml;

    $('results').style.display = 'block';
    if (servers.length > 0) selectServer(0);
    $('results').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function selectServer(idx) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
    const srv = servers[idx];
    if (!srv) return;
    $('frame').src = srv.url;
    $('frame').style.display = 'block';
    $('ph').style.display = 'none';
  }

  function urlRow(label, url) {
    const safe = esc(url);
    return `<div class="url-row">
      <span class="url-lbl">${esc(label)}</span>
      <span class="url-val" title="${safe}">${safe}</span>
      <button class="cp" onclick="cp(this,'${safe}')">Copy</button>
    </div>`;
  }

  function cp(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
